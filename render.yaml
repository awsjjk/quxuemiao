services:
  - type: web
    name: quxuemiao-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: quxuemiao-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HF_MATCH_API_URL
        sync: false

databases:
  - name: quxuemiao-db
    plan: free
